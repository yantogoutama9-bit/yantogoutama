<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selamat Idul Fitri 1447 H</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 40px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
      max-width: 600px;
      animation: fadeIn 2s ease;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.8em;
      margin-bottom: 20px;
      color: #ffd700;
    }

    p {
      font-size: 1.2em;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .signature {
      margin-top: 20px;
      font-style: italic;
      font-size: 1.1em;
      color: #ddd;
    }

    .image {
      margin-bottom: 25px;
    }

    .image img {
      width: 180px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
      animation: float 4s ease-in-out infinite;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .glow {
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.7),
                   0 0 20px rgba(255, 215, 0, 0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    
    <div class="image">
      <img src="https://images.unsplash.com/photo-1608889175123-8ee362201f03?auto=format&fit=crop&w=400&q=80" alt="Ketupat Lebaran">
    </div>

    <h1 class="glow">Selamat Idul Fitri 1447 H</h1>

    <p>
      Taqabbalallahu minna wa minkum,<br>
      mohon maaf lahir dan batin.<br><br>
      Semoga hati kembali bersih,<br>
      langkah kembali lurus,<br>
      dan hidup semakin dekat dengan Sang Pencipta.
    </p>

    <div class="signature">
      — Dari Yanto Goutama —
    </div>

  </div>
</body>
</html>
