<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selamat Idul Fitri 1447 H</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at center, #0b1a20, #02090c);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  color: white;
}

/* GLOW BACKGROUND */
body::before {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(255,215,0,0.15), transparent 70%);
  animation: pulse 6s infinite ease-in-out;
}

@keyframes pulse {
  0%,100% { transform: scale(1); opacity: 0.4; }
  50% { transform: scale(1.2); opacity: 0.8; }
}

/* ARCH ISLAMI */
.arch {
  position: relative;
  width: 420px;
  padding: 50px 30px;
  text-align: center;
  border-radius: 200px 200px 20px 20px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,215,0,0.2);
  box-shadow: 0 0 40px rgba(255,215,0,0.15);
  backdrop-filter: blur(10px);
  animation: fadeUp 2s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

/* BULAN SABIT */
.moon {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  box-shadow: -20px 0 0 0 gold;
  margin: 0 auto 20px;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.5em;
  color: gold;
  text-shadow: 0 0 20px rgba(255,215,0,0.6);
  margin-bottom: 15px;
}

p {
  font-size: 1.1em;
  line-height: 1.6;
  color: #ddd;
}

.signature {
  margin-top: 20px;
  font-style: italic;
  color: #aaa;
}

/* PARTIKEL HALUS */
.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: gold;
  border-radius: 50%;
  opacity: 0.6;
  animation: rise 8s infinite linear;
}

@keyframes rise {
  from {
    transform: translateY(100vh);
    opacity: 0;
  }
  to {
    transform: translateY(-10vh);
    opacity: 0.8;
  }
}
</style>
</head>

<body>

<!-- PARTIKEL -->
<div class="particle" style="left:10%; animation-delay:0s;"></div>
<div class="particle" style="left:30%; animation-delay:2s;"></div>
<div class="particle" style="left:50%; animation-delay:4s;"></div>
<div class="particle" style="left:70%; animation-delay:1s;"></div>
<div class="particle" style="left:85%; animation-delay:3s;"></div>

<div class="arch">

  <div class="moon"></div>

  <h1>Selamat Idul Fitri 1447 H</h1>

  <p>
    Taqabbalallahu minna wa minkum,<br>
    mohon maaf lahir dan batin.<br><br>
    Semoga hati kembali jernih,<br>
    langkah kembali lurus,<br>
    dan hidup diliputi cahaya keberkahan.
  </p>

  <div class="signature">
    — Dari Yanto Goutama —
  </div>

</div>

</body>
</html>
